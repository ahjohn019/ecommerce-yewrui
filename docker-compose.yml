services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: assessment_question_two-app
    working_dir: /var/www/html
    env_file:
      - .env
    ports:
      - "80:8000"
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_DEBUG: ${APP_DEBUG:-true}
      APP_URL: ${APP_URL:-http://assessment_question_two.com}
      DB_CONNECTION: ${DB_CONNECTION:-mysql}
      DB_HOST: mysql
      DB_PORT: ${DB_PORT:-3306}
      DB_DATABASE: ${DB_DATABASE:-ecommerce-yewrui}
      DB_USERNAME: ${DB_USERNAME:-root}
      DB_PASSWORD: ${DB_PASSWORD:-root}
      CACHE_STORE: ${CACHE_STORE:-file}
      SESSION_DRIVER: ${SESSION_DRIVER:-database}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
      RUN_MIGRATIONS: "1"
    volumes:
      - .:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy

  vite:
    image: node:22-alpine
    container_name: assessment_question_two-vite
    working_dir: /var/www/html
    ports:
      - "5173:5173"
    volumes:
      - .:/var/www/html
    command: sh -lc "npm install && npm run dev -- --host 0.0.0.0"

  mysql:
    image: mysql:8.0
    container_name: assessment_question_two-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-ecommerce-yewrui}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql-data:
